name: release

# Builds the darwin-arm64 release on a tag, then makes it independently
# verifiable: a CycloneDX SBOM, keyless cosign signatures, and SLSA build
# provenance (the artifact was built by THIS workflow from THIS commit). All
# of it is attached to the GitHub release. See SECURITY.md "Verifying a
# release" for the consumer-side checks.
#
# After publish, bump-tap pushes the url/sha256/version bump to
# sricola/homebrew-drydock so the formula can't drift behind releases again
# (it sat at v0.2.0 through v0.4.0). Formula prose (caveats, license) stays
# hand-maintained. The job runs after the release is published, so a bump
# failure never blocks the artifacts — it just fails this workflow loudly.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # dispatch against a tag ref to (re)build its artifacts

permissions:
  contents: write # create the release + upload assets
  id-token: write # OIDC for cosign keyless + provenance
  attestations: write # actions/attest-build-provenance

jobs:
  release:
    # Apple silicon runner — drydock ships a darwin-arm64 binary built against
    # Apple's `container` runtime; cross-building elsewhere is not supported.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # full history so `git describe` resolves the tag

      - name: Verify preflight receipt
        # tag-release embeds "preflight: <commit> green <utc>" in the tag
        # annotation only after release-preflight (unit + host red-team +
        # VM-backed A1/A2/A7) passes. Refuse to build a bare `git tag` so the
        # VM gate cannot be skipped by accident (V-02). This binds publication
        # to the blessed workflow; it is not cryptographic proof against a
        # deliberately hostile maintainer.
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in v*) ;; *) echo "::error::not a tag ref: $tag"; exit 2 ;; esac
          commit="$(git rev-parse "refs/tags/${tag}^{commit}")"
          if ! git tag -l --format='%(contents)' "$tag" | grep -Eq "^preflight: ${commit} green "; then
            echo "::error::tag ${tag} has no preflight receipt for ${commit}; cut releases with 'make tag-release VERSION=${tag}'"
            exit 1
          fi

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build dist tarball (darwin-arm64)
        run: make dist

      - name: Generate CycloneDX SBOM
        run: make sbom

      - name: Resolve artifact path
        id: art
        run: echo "tarball=$(ls dist/drydock-*-darwin-arm64.tar.gz)" >> "$GITHUB_OUTPUT"

      - name: SLSA build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ steps.art.outputs.tarball }}

      - name: Install cosign
        # cosign-installer publishes v4.x releases but no moving `v4` major tag;
        # `v3` is the latest resolvable major tag.
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign the tarball (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature "${{ steps.art.outputs.tarball }}.sig" \
            --output-certificate "${{ steps.art.outputs.tarball }}.pem" \
            "${{ steps.art.outputs.tarball }}"

      - name: Publish release with artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/drydock-*-darwin-arm64.tar.gz
            dist/drydock-*-darwin-arm64.tar.gz.sha256
            dist/drydock-*-darwin-arm64.tar.gz.sig
            dist/drydock-*-darwin-arm64.tar.gz.pem
            dist/drydock-*-darwin-arm64-bin.sha256
            dist/drydock.cdx.json

  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # release asset download only; tap push uses the PAT
    steps:
      # HOMEBREW_TAP_TOKEN: fine-grained PAT, Contents read/write on
      # sricola/homebrew-drydock ONLY. The default GITHUB_TOKEN cannot push
      # cross-repo. When it's absent the tap is bumped by hand, so skip cleanly
      # (green job + a notice) rather than failing every release. Setting the
      # secret later activates the automation with no further change. Secrets
      # can't be used in a job/step `if:`, so gate downstream steps on this
      # step's output instead.
      - name: Check tap token
        id: gate
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping automated tap bump (bump the formula by hand). To enable: fine-grained PAT with Contents read/write on sricola/homebrew-drydock, then gh secret set HOMEBREW_TAP_TOKEN -R ${GITHUB_REPOSITORY}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: steps.gate.outputs.skip != 'true'
        with:
          repository: sricola/homebrew-drydock
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Resolve published tarball sha256
        id: rel
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Guard the workflow_dispatch-against-a-branch case: only tag refs
          # correspond to a release with assets.
          case "$TAG" in v*) ;; *) echo "::error::not a tag ref: $TAG"; exit 2 ;; esac
          sha="$(gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p '*.tar.gz.sha256' -O - | awk '{print $1}')"
          echo "$sha" | grep -Eq '^[0-9a-f]{64}$' || { echo "::error::bad sha256 from release asset: '$sha'"; exit 2; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Rewrite formula url/sha256/version
        if: steps.gate.outputs.skip != 'true'
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ steps.rel.outputs.sha }}
        run: |
          ver="${TAG#v}"
          sed -i -E \
            -e "s|download/v[0-9][^/]*/drydock-v[0-9][^-]*-darwin|download/${TAG}/drydock-${TAG}-darwin|" \
            -e "s|^(  sha256 \")[0-9a-f]{64}(\")|\1${SHA}\2|" \
            -e "s|^(  version \")[0-9.]+(\")|\1${ver}\2|" \
            Formula/drydock.rb
          # sed exits 0 on no-match — verify every field actually landed.
          grep -Fq "download/${TAG}/drydock-${TAG}-darwin-arm64.tar.gz" Formula/drydock.rb
          grep -Fq "sha256 \"${SHA}\"" Formula/drydock.rb
          grep -Fq "version \"${ver}\"" Formula/drydock.rb

      - name: Commit and push
        if: steps.gate.outputs.skip != 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git add Formula/drydock.rb
          if git diff --cached --quiet; then
            echo "formula already at ${TAG} (re-run against an existing tag) — nothing to push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "drydock ${TAG#v}

          Automated bump by ${GITHUB_REPOSITORY} release workflow (run ${GITHUB_RUN_ID})."
          git push
