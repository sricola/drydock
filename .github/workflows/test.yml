name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: go vet ./...

  # Integration testing (boot brokerd, run a task, hit the gateway/squid
  # listeners) requires Apple's `container` runtime which only runs on macOS
  # Apple silicon. GitHub-hosted runners don't provide that today, so it
  # lives outside CI. See README "First run" for the manual smoke.
