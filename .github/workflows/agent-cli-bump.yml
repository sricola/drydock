name: agent-cli-bump

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: fetch latest npm versions
        id: fetch
        run: |
          set -euo pipefail
          {
            echo "versions<<EOF"
            for pkg in "@anthropic-ai/claude-code" "@openai/codex" "opencode-ai" "@google/gemini-cli"; do
              ver=$(npm view "$pkg" version 2>/dev/null || true)
              if [ -z "$ver" ]; then
                echo "::warning::npm view $pkg returned empty; skipping"
                continue
              fi
              printf '%s=%s\n' "$pkg" "$ver"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: rewrite Dockerfile pins
        id: rewrite
        run: |
          set -euo pipefail
          SUMMARY=$(printf '%s\n' "$VERSIONS" | go run ./cmd/cli-bump)
          {
            echo "summary<<EOF"
            printf '%s\n' "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          VERSIONS: ${{ steps.fetch.outputs.versions }}

      - name: open bump PR
        run: |
          set -euo pipefail
          if git diff --quiet image/Dockerfile; then
            echo "Dockerfile unchanged, nothing to bump."
            exit 0
          fi
          BRANCH="agent-cli-bump"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add image/Dockerfile
          git commit -m "chore: bump pinned agent CLIs $(date +%Y%m%d)"
          # Plain force: agent-cli-bump is a disposable bot-owned branch, always
          # regenerated from main + the current bumps. force-with-lease needs a
          # remote-tracking ref this fresh checkout does not have, so it rejects
          # with "stale info" once the branch exists from a prior run.
          git push --force -u origin "$BRANCH"
          {
            printf '## Agent CLI version bumps\n\n'
            printf '%s\n' "$SUMMARY"
            printf '\n---\n\n'
            printf 'Note: A GITHUB_TOKEN-authored PR does not auto-trigger CI. The reviewer must run the red-team gate (make redteam and make redteam-vm) before merging.\n'
          } > /tmp/pr-body.md
          compare="https://github.com/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "bump PR already open for $BRANCH; branch updated."
          elif gh pr create --base main --head "$BRANCH" --title "chore: bump pinned agent CLIs" --body-file /tmp/pr-body.md; then
            echo "opened bump PR."
          else
            # Auto-PR is blocked when the repo setting "Allow GitHub Actions to
            # create and approve pull requests" is off (the GitHub default). The
            # branch is pushed regardless, so emit a one-click compare link and
            # keep the job green rather than failing every scheduled run.
            echo "::warning::could not auto-create the bump PR (enable 'Allow GitHub Actions to create and approve pull requests' in repo Settings to restore it). Branch pushed; open a PR: ${compare}"
            {
              printf '### Agent CLI bump ready (auto-PR blocked)\n\n'
              printf 'The branch `%s` is pushed with the bumps. Open a PR: %s\n\n' "$BRANCH" "$compare"
              printf 'To restore auto-creation, enable "Allow GitHub Actions to create and approve pull requests" in Settings, Actions, General.\n\n---\n\n'
              cat /tmp/pr-body.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.rewrite.outputs.summary }}
