name: agent-cli-bump

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC weekly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: fetch latest npm versions
        id: fetch
        run: |
          CLAUDE=$(npm view @anthropic-ai/claude-code version)
          CODEX=$(npm view @openai/codex version)
          OPENCODE=$(npm view opencode-ai version)
          GEMINI=$(npm view @google/gemini-cli version)
          {
            echo "versions<<EOF"
            printf '@anthropic-ai/claude-code=%s\n@openai/codex=%s\nopencode-ai=%s\n@google/gemini-cli=%s\n' \
              "$CLAUDE" "$CODEX" "$OPENCODE" "$GEMINI"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: rewrite Dockerfile pins
        id: rewrite
        run: |
          SUMMARY=$(printf '%s\n' "$VERSIONS" | go run ./cmd/cli-bump)
          {
            echo "summary<<EOF"
            printf '%s\n' "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          VERSIONS: ${{ steps.fetch.outputs.versions }}

      - name: open bump PR
        run: |
          if git diff --quiet image/Dockerfile; then
            echo "Dockerfile unchanged, nothing to bump."
            exit 0
          fi
          DATE=$(date +%Y%m%d)
          BRANCH="agent-cli-bump-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add image/Dockerfile
          git commit -m "chore: bump pinned agent CLIs ${DATE}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: bump pinned agent CLIs" \
            --body "## Agent CLI version bumps

          ${SUMMARY}

          ---

          Note: A GITHUB_TOKEN-authored PR does not auto-trigger CI. The reviewer must run the red-team gate (make redteam and make redteam-vm) before merging."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.rewrite.outputs.summary }}
